<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Oswald:wght@200..700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">

  <link rel="icon" href="favicon.ico" />
  <title>Portfolio Site</title>
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header class="header">
    <div class="container header__container">

      <a href="index.html" class="logo header__logo">
        <img src="./assets/icons/icon.png" alt="Site icon" class="logo__image" />
      </a>

      <nav class="nav header__nav" aria-label="Main navigation">
        <ul class="nav__list" id="navList" role="list">
          <li class="nav__item"><a href="" class="nav__link">ABOUT ME</a></li>
          <li class="nav__item"><a href="" class="nav__link">PORTFOLIO</a></li>
          <li class="nav__item"><a href="" class="nav__link">PRICE</a></li>
          <li class="nav__item"><a href="" class="nav__link">FAQ</a></li>
          <li class="nav__item"><a href="" class="nav__link">CONTACTS</a></li>
        </ul>
      </nav>

      <button class="burger header__burger" aria-label="Open menu" aria-expanded="false">
        <span class="burger__inner">
          <span class="burger__line"></span>
          <span class="burger__line"></span>
        </span>
      </button>

    </div>
  </header>

  <!-- ================= MAIN ================= -->
  <main>
    <!-- HERO -->
    <section class="hero">
      <div class="container hero__container">

        <aside class="hero__side">
          <span class="hero__vertical-text">Best Photographer by MAX</span>
          <span class="hero__line"></span>
          <span class="hero__vertical-text">2025</span>
        </aside>

        <div class="hero__main">

          <div class="hero__content">
            <div class="hero__stats">

              <div class="stat">
                <span class="stat__plus">+</span>
                <span class="stat__number">487</span>
                <span class="stat__label">Photo sessions</span>
              </div>

              <div class="stat">
                <span class="stat__plus">+</span>
                <span class="stat__number">356</span>
                <span class="stat__label">Satisfied clients</span>
              </div>

            </div>

            <h1 class="hero__title">
              Professional photographer
            </h1>

            <p class="hero__subtitle">
              Capture the Moment. Tell Your Story.
            </p>
          </div>

          <button class="hero__scroll" aria-label="Scroll down">
            <span>Scroll down</span>
            <img src="./assets/icons/arrow-down.png" alt="">
          </button>

        </div>

        <div class="hero__media">
          <img src="./assets/images/img-10.png" alt="Woman in the mountains" class="hero__photo-minor">
          <div class="hero__intro">
            <img src="./assets/images/img-11.png" alt="Woman's portrait" class="hero__photo-primary">
            <p class="hero__intro-text">
              Hi! I’m Vera, a photographer. For me, photography is more than just an image.
            </p>
          </div>
        </div>

      </div>
    </section>
  </main>

</body>

</html>
